<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Selector – DevToolkit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #cc7000;
            --accent: #ff8c00;
            --accent-hover: #e67e00;
            --content-bg: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fff5e6;
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            background: var(--sidebar-bg);
            padding: 1rem 2rem;
            text-align: center;
            color: white;
        }

        header h1 { font-size: 1.5rem; font-weight: 700; }

        .app-container {
            display: flex;
            max-width: 1300px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 1rem;
            gap: 2rem;
            align-items: flex-start;
        }

        .sidebar {
            width: 250px;
            background: white;
            border-radius: 1rem;
            padding: 1.5rem 1rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.8rem 1.2rem;
            text-align: left;
            cursor: pointer;
            border-radius: 0.75rem;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s;
            text-decoration: none;
        }

        .nav-btn:hover { background: #fff0e0; color: var(--accent); }

        .nav-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(255,140,0,0.3);
        }

        .content-area {
            flex: 1;
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: var(--shadow);
        }

        h2 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
            color: var(--sidebar-bg);
            border-bottom: 2px solid var(--accent);
            display: inline-block;
            padding-bottom: 0.3rem;
        }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.4rem; color: var(--text-primary); }
        select {
            width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--border-color); border-radius: 0.75rem;
            font-size: 0.95rem; font-family: inherit; transition: 0.2s; background: #f9fafb;
        }
        select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,140,0,0.15); background: white; }

        .license-summary {
            background: #fff0e0;
            padding: 1rem 1.2rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--accent);
        }
        .license-summary p { font-size: 0.95rem; line-height: 1.6; }

        .btn-group { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .btn {
            padding: 0.7rem 1.6rem; border: none; border-radius: 0.75rem; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(255,140,0,0.25); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: white; color: var(--text-primary); border: 2px solid var(--border-color); }
        .btn-secondary:hover { background: #fff5e6; border-color: var(--accent); }

        .preview-container { margin-top: 2rem; border: 2px solid var(--border-color); border-radius: 0.75rem; overflow: hidden; }
        .preview-header { background: #f9fafb; padding: 0.75rem 1rem; font-weight: 600; font-size: 0.85rem; color: var(--text-secondary); }
        .preview-content { padding: 0; }
        .preview-content textarea {
            border: none; border-radius: 0; min-height: 300px; resize: none; width: 100%; padding: 1rem;
            font-family: monospace; font-size: 0.9rem; outline: none;
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .sidebar { width: 100%; flex-direction: row; overflow-x: auto; position: static; gap: 0.5rem; }
            .content-area { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>License Selector</h1>
    </header>
    <div class="app-container">
        <nav class="sidebar">
            <a href="index.html" class="nav-btn" style="text-decoration:none;">← Home</a>
            <button class="nav-btn active" disabled style="opacity:1; cursor:default;">⚖️ License Selector</button>
        </nav>
        <main class="content-area">
            <h2>Choose a License</h2>
            <div class="form-group">
                <label for="license-select">Select License</label>
                <select id="license-select"></select>
            </div>
            <div class="license-summary" id="license-summary">
                <p>Select a license to see its summary and full text.</p>
            </div>
            <div class="preview-container">
                <div class="preview-header">Full License Text</div>
                <div class="preview-content"><textarea id="license-text" readonly></textarea></div>
            </div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="LicenseModule.copyLicense()">📋 Copy License</button>
                <button class="btn btn-secondary" onclick="LicenseModule.downloadLicense()">⬇️ Download LICENSE</button>
            </div>
        </main>
    </div>

                'BSD 2-Clause': {
                    summary: 'The BSD 2-Clause License is a permissive license that allows redistribution and use in source and binary forms, with or without modification, as long as the copyright notice and disclaimer are retained.',
                    text: `BSD 2-Clause License\n\nCopyright (c) [year], [fullname]\n\nRedistribution and use in source and binary forms, with or without modification, are permitted provided that the following conditions are met:\n\n1. Redistributions of source code must retain the above copyright notice, this list of conditions and the following disclaimer.\n\n2. Redistributions in binary form must reproduce the above copyright notice, this list of conditions and the following disclaimer in the documentation and/or other materials provided with the distribution.\n\nTHIS SOFTWARE IS PROVIDED BY THE COPYRIGHT HOLDERS AND CONTRIBUTORS "AS IS" AND ANY EXPRESS OR IMPLIED WARRANTIES, INCLUDING, BUT NOT LIMITED TO, THE IMPLIED WARRANTIES OF MERCHANTABILITY AND FITNESS FOR A PARTICULAR PURPOSE ARE DISCLAIMED. IN NO EVENT SHALL THE COPYRIGHT HOLDER OR CONTRIBUTORS BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL, SPECIAL, EXEMPLARY, OR CONSEQUENTIAL DAMAGES (INCLUDING, BUT NOT LIMITED TO, PROCUREMENT OF SUBSTITUTE GOODS OR SERVICES; LOSS OF USE, DATA, OR PROFITS; OR BUSINESS INTERRUPTION) HOWEVER CAUSED AND ON ANY THEORY OF LIABILITY, WHETHER IN CONTRACT, STRICT LIABILITY, OR TORT (INCLUDING NEGLIGENCE OR OTHERWISE) ARISING IN ANY WAY OUT OF THE USE OF THIS SOFTWARE, EVEN IF ADVISED OF THE POSSIBILITY OF SUCH DAMAGE.`
                },
                'BSD 3-Clause': {
                    summary: 'The BSD 3-Clause License is similar to the 2-Clause version but adds a clause that prohibits using the names of copyright holders to endorse or promote products derived from the software without permission.',
                    text: `BSD 3-Clause License\n\nCopyright (c) [year], [fullname]\n\nRedistribution and use in source and binary forms, with or without modification, are permitted provided that the following conditions are met:\n\n1. Redistributions of source code must retain the above copyright notice, this list of conditions and the following disclaimer.\n\n2. Redistributions in binary form must reproduce the above copyright notice, this list of conditions and the following disclaimer in the documentation and/or other materials provided with the distribution.\n\n3. Neither the name of the copyright holder nor the names of its contributors may be used to endorse or promote products derived from this software without specific prior written permission.\n\nTHIS SOFTWARE IS PROVIDED BY THE COPYRIGHT HOLDERS AND CONTRIBUTORS "AS IS" AND ANY EXPRESS OR IMPLIED WARRANTIES, INCLUDING, BUT NOT LIMITED TO, THE IMPLIED WARRANTIES OF MERCHANTABILITY AND FITNESS FOR A PARTICULAR PURPOSE ARE DISCLAIMED. IN NO EVENT SHALL THE COPYRIGHT HOLDER OR CONTRIBUTORS BE LIABLE FOR ANY DIRECT, INDIRECT, INCIDENTAL, SPECIAL, EXEMPLARY, OR CONSEQUENTIAL DAMAGES (INCLUDING, BUT NOT LIMITED TO, PROCUREMENT OF SUBSTITUTE GOODS OR SERVICES; LOSS OF USE, DATA, OR PROFITS; OR BUSINESS INTERRUPTION) HOWEVER CAUSED AND ON ANY THEORY OF LIABILITY, WHETHER IN CONTRACT, STRICT LIABILITY, OR TORT (INCLUDING NEGLIGENCE OR OTHERWISE) ARISING IN ANY WAY OUT OF THE USE OF THIS SOFTWARE, EVEN IF ADVISED OF THE POSSIBILITY OF SUCH DAMAGE.`
                },
                'Mozilla Public License 2.0': {
                    summary: 'The Mozilla Public License 2.0 is a weak copyleft license that requires modifications to MPL-licensed files to be released under the MPL, but allows combining with proprietary code in larger works.',
                    text: `Mozilla Public License Version 2.0\n\n1. Definitions\n\n1.1. "Contributor" means each individual or legal entity that creates, contributes to the creation of, or owns Covered Software.\n\n1.2. "Contributor Version" means the combination of the Contributions of others and the Contributor's own contributions.\n\n1.3. "Covered Software" means Source Code Form to which the initial Contributor has attached the notice in Exhibit A, the Executable Form of such Source Code Form, and Modifications of such Source Code Form.\n\n1.4. "Incompatible With Secondary Licenses" means that the license is not compatible with certain secondary licenses.\n\n1.5. "Larger Work" means a work that combines Covered Software with other material.\n\n1.6. "License" means this document.\n\n1.7. "Licensable" means having the right to grant, to the maximum extent possible.\n\n1.8. "Patent Claims" means any patent claim(s) owned or licensable by a Contributor.\n\n1.9. "Secondary License" means certain licenses listed in Exhibit B.\n\n1.10. "Source Code Form" means the form of source code preferred for making modifications.\n\n2. License Grants and Conditions\n\n2.1. Grants\n\nEach Contributor hereby grants You a world-wide, royalty-free, non-exclusive license: (a) under intellectual property rights to use, reproduce, make available, modify, display, perform, distribute, and otherwise exploit its Contributions; (b) under Patent Claims to make, use, sell, offer for sale, have made, import, and otherwise transfer either its Contributions or its Contributor Version.\n\n2.2. Effective Date\n\nThe licenses granted in Section 2.1 become effective on the date the Contributor distributes the Covered Software.\n\n2.3. Conditions\n\nThe licenses granted in Section 2.1 are subject to the conditions that You: (a) make Available any Modification You create or contribute to; (b) inform each downstream recipient that You have modified the Covered Software; (c) retain all copyright, patent                 'Unlicense': {

            init() {
                const licenseSelect = document.getElementById('license-select');
                Object.keys(this.licenses).forEach(license => {
                    const option = document.createElement('option');
                    option.value = license;
                    option.textContent = license;
                    licenseSelect.appendChild(option);
                });
                licenseSelect.addEventListener('change', () => this.displayLicense());
                this.displayLicense();
            },
            displayLicense() {
                const license = document.getElementById('license-select').value;
                const licenseData = this.licenses[license];
                if (licenseData) {
                    document.getElementById('license-summary').innerHTML = `<p>${licenseData.summary}</p>`;
                    document.getElementById('license-text').value = licenseData.text;
                    this.currentLicense = licenseData.text;
                }
            },
            copyLicense() {
                if (this.currentLicense) {
                    navigator.clipboard.writeText(this.currentLicense).then(() => {
                        alert('License text copied to clipboard!');
                    }).catch(err => {
                        console.error('Failed to copy:', err);
                    });
                }
            },
            downloadLicense() {
                if (this.currentLicense) {
                    const blob = new Blob([this.currentLicense], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'LICENSE';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            }
        };
        document.addEventListener('DOMContentLoaded', () => LicenseModule.init());

</body>
</html>
