<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevToolkit – Essential developer tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ff8c00; /* dark orange */
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 700px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        p.tagline {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            opacity: 0.95;
        }

        .tool-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .tool-btn {
            background: #ffffff;
            color: #ff8c00;
            padding: 1.2rem 2.5rem;
            border-radius: 1rem;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            background: #fff5e6;
        }

        .privacy-note {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 1rem;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            opacity: 0.75;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.2rem;
            }
            .tool-btn {
                padding: 1rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>DevToolkit</h1>
        <p class="tagline">Essential tools for developers · Built by Helios · PeerTutor</p>
        <div class="tool-buttons">
            <a href="readme.html" class="tool-btn">📄 README Generator</a>
            <a href="gitignore.html" class="tool-btn">🛡️ .gitignore Generator</a>
            <a href="license.html" class="tool-btn">⚖️ License Selector</a>
        </div>
        <p class="privacy-note">🔒 All data stays in your browser. No tracking, no ads.</p>
        <footer>Built with ❤️ by Helios & PeerTutor</footer>
    </div>
    <!-- Optional visitor counter -->
    <div style="margin-top: 2rem;">
        <img src="https://hitwebcounter.com/counter/counter.php?page=devtoolkit-home&style=0006&nbdigits=5&type=page&initCount=0" alt="visitor counter" border="0" />
    </div>
</body>
</html>
