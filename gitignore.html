            init() {
                const languageSelect = document.getElementById('gitignore-language');
                Object.keys(this.templates).forEach(lang => {
                    const option = document.createElement('option');
                    option.value = lang;
                    option.textContent = lang;
                    languageSelect.appendChild(option);
                });
                languageSelect.addEventListener('change', () => this.generate());
                document.getElementById('gitignore-windows').addEventListener('change', () => this.generate());
                document.getElementById('gitignore-macos').addEventListener('change', () => this.generate());
                document.getElementById('gitignore-linux').addEventListener('change', () => this.generate());
                this.generate();
            },
            generate() {
                const language = document.getElementById('gitignore-language').value;
                let content = this.templates[language] || '';
                if (document.getElementById('gitignore-windows').checked) {
                    content += '\n\n' + this.osTemplates.windows;
                }
                if (document.getElementById('gitignore-macos').checked) {
                    content += '\n\n' + this.osTemplates.macos;
                }
                if (document.getElementById('gitignore-linux').checked) {
                    content += '\n\n' + this.osTemplates.linux;
                }
                document.getElementById('gitignore-output').value = content.trim();
                this.currentContent = content.trim();
            },
            copyToClipboard() {
                if (this.currentContent) {
                    navigator.clipboard.writeText(this.currentContent).then(() => {
                        alert('.gitignore content copied to clipboard!');
                    }).catch(err => {
                        console.error('Failed to copy:', err);
                    });
                }
            },
            downloadGitignore() {
                if (this.currentContent) {
                    const blob = new Blob([this.currentContent], { type: 'text/plain' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '.gitignore';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }
            }
        };
        document.addEventListener('DOMContentLoaded', () => GitignoreModule.init());
